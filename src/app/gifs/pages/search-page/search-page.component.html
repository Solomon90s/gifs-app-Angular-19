<section>
  <hgroup>
    <h1 class="text-2xl font-bold mt-5">Buscar Gifs</h1>
    <h2 class="text-lg text-gray-500">
      Buscar gifs por nombre, descripción o tags
    </h2>
  </hgroup>
</section>

<section class="flex flex-col gap-4">
  <input
    type="text"
    placeholder="Buscar Gifs"
    class="mt-3 border focus:outline-2 focus:outline-offset-2 focus:outline-blue-800 shadow-lg border-gray-300 rounded-md p-2"
    (keyup.enter)="onSearch(txtSearch.value)"
    #txtSearch
  />
</section>

<section class="py-5">
  <gif-list [gifs]="gifs()" />
</section>
