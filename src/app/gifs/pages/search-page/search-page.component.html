<h2 class="text-2xl font-bold mt-2">Buscar Gifs</h2>
<h3 class="text-sm text-gray-500">
  Buscar gifs por nombre, descripción o tags
</h3>
<section class="flex flex-col gap-4">
  <input type="text" placeholder="Buscar gifs" class="mt-3 border border-gray-300 rounded-md p-2"
    (keyup.enter)="onSearch(txtSearch.value)" #txtSearch (keyup.enter)="txtClear.value = ''" #txtClear />
</section>

<section class="py-5">
  <gifs-list [gifs]="gifs()" />
</section>
